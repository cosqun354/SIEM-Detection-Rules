index=* sourcetype="docker:json" 
| rex field=line "^(?<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[[^\]]+\]\s+\"\w+\s+(?<uri>\S+)\s+HTTP"
| eval uri_decoded = urldecode(uri)
| eval attack_type = case(
    match(uri_decoded, "(?i)(<script|alert\()"), "XSS",
    match(uri_decoded, "(?i)(select|union|--)"), "SQLi",
    match(uri_decoded, "(?i)\.\.\/|\/etc\/passwd"), "Path Traversal",
    match(uri_decoded, "url=http"), "SSRF",
    match(uri_decoded, "\.env|\.git"), "Sensitive Info Access",
    1=1, "Potential Probe"
)
| where attack_type != "Potential Probe"
| table _time, client_ip, attack_type, uri_decoded
