index=* sourcetype="docker:json"
| rex field=line "^(?<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[[^\]]+\]\s+\"\w+\s+(?<uri>\S+)\s+HTTP"
| eval uri_decoded = urldecode(uri)
| eval hucum_novu = case(
    match(uri_decoded, "(?i)(<script|alert\(\))"), "XSS Hücumu",
    match(uri_decoded, "(?i)(select|union|--)"), "SQL Injection",
    match(uri_decoded, "(?i)\.\.\/|\/etc\/passwd"), "Path Traversal",
    1=1, "Digər"
)
| where hucum_novu != "Digər"
| stats count by hucum_novu

