index=* sourcetype="docker:json"
| rex field=line "^(?<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[[^\]]+\]\s+\"\w+\s+(?<uri>\S+)\s+HTTP"
| eval uri_decoded = urldecode(uri)
| where match(uri_decoded, "(?i)(;|\||&&|%0a|%0d)(whoami|ls|cat|ifconfig|ipconfig|wget|curl|net\s+user)")
| table _time, client_ip, uri_decoded
