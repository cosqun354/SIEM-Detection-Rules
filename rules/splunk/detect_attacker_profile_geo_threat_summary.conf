index=* sourcetype="docker:json"
| rex field=line "^(?<client_ip>\d+\.\d+\.\d+\.\d+)\s+-\s+-\s+\[[^\]]+\]\s+\"(?<method>\w+)\s+(?<uri>\S+)\s+HTTP\/\d\.\d\"\s+(?<status>\d{3})\s+\d+\s+\"(?<referer>[^\"]*)\"\s+\"(?<http_user_agent>[^\"]*)\""
| eval uri_decoded = urldecode(uri)
| eval hucum_tipi = case(
    match(uri_decoded, "(?i)(select|union|--|insert|drop|information_schema)"), "SQL Injection",
    match(uri_decoded, "(?i)(<script|alert\(|onerror|onload|javascript:)"), "XSS Hücumu",
    match(uri_decoded, "(?i)(\.\.\/|\.\.\\|\/etc\/passwd|win\.ini)"), "Path Traversal",
    match(uri_decoded, "(?i)(whoami|ls\s|cat\s|bash|cmd\.exe|powershell)"), "Command Injection",
    match(uri_decoded, "(?i)(url=http|dest=http|uri=http|path=http)"), "SSRF Cəhdi",
    match(http_user_agent, "(?i)(sqlmap|nikto|dirbuster|nmap|zaproxy|wpscan|masscan)"), "Avtomatlaşdırılmış Skaner",
    1=1, "Digər Şübhəli Aktivlik"
)
| iplocation client_ip
| fillnull value="Naməlum" Country, City
| stats 
    count as "Toplam Hücum", 
    values(hucum_tipi) as "Hücum Növləri", 
    values(method) as "Metodlar",
    dc(uri) as "Hədəf Alınan Resurs Sayı",
    earliest(_time) as "İlk Görülmə", 
    latest(_time) as "Son Görülmə" 
    by client_ip, Country, City
| eval "Hücum Növləri" = mvjoin('Hücum Növləri', ", ")
| eval "Metodlar" = mvjoin('Metodlar', ", ")
| fieldformat "İlk Görülmə"=strftime('İlk Görülmə', "%Y-%m-%d %H:%M:%S")
| fieldformat "Son Görülmə"=strftime('Son Görülmə', "%Y-%m-%d %H:%M:%S")
| sort - "Toplam Hücum"    
