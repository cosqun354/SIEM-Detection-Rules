index=* sourcetype="docker:json"
| rex field=line "^(?<client_ip>\d+\.\d+\.\d+\.\d+).+\s+(?<status>\d{3})\s+(?<bytes_sent>\d+)"
| stats sum(bytes_sent) as total_outbound_bytes, count as request_count by client_ip
| eventstats avg(total_outbound_bytes) as avg_all_users, stdev(total_outbound_bytes) as std_all_users
| where total_outbound_bytes > (avg_all_users + 3 * std_all_users) AND request_count > 10
| eval anomaly_score = round((total_outbound_bytes - avg_all_users) / std_all_users, 2)
| table client_ip, total_outbound_bytes, avg_all_users, anomaly_score
| sort - anomaly_score
